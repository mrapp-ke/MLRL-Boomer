---
datasets:
  - directory: data
    names: bibtex
  - directory: data
    names:
      - emotions
      - yeast
parameters:
  - name: --instance-sampling
    values:
      - none
      - with-replacement{sample_size=0.5}
  - name: --loss
    values:
      - logistic-decomposable
      - value: logistic-non-decomposable
        additional_arguments:
          - --label-binning none
      - value: logistic-non-decomposable
        additional_arguments:
          - --label-binning equal-width
