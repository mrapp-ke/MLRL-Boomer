---
name: Publish development packages
on:
  push:
    branches:
      - main
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-slim
    outputs:
      code: ${{ steps.filter.outputs.code }}
      doc: ${{ steps.filter.outputs.doc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            build_system
            cpp
            python
      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            build_files: &build_files
              - ./.github/workflows/publish_development.yml
            code: &code
              - *build_files
              - ./.github/workflows/template_publish.yml
              - ./.github/workflows/template_publish_pure.yml
              - ./.github/workflows/template_publish_platform.yml
              - ./.github/workflows/template_publish_platform_linux.yml
              - ./.github/workflows/template_publish_platform_macos.yml
              - ./.github/workflows/template_publish_platform_windows.yml
              - build_system/res/versioning/version-cpp
              - build_system/res/versioning/version-python
              - cpp/subprojects/**/include/**
              - cpp/subprojects/**/src/**
              - python/subprojects/**/mlrl/**
            doc:
              - *code
              - ./.github/workflows/template_publish_doc.yml
              - ./.github/workflows/template_publish_doc_rtd.yml
              - build_system/targets/documentation/rtd/*
              - .readthedocs/.readthedocs.yaml
              - 'doc/conf.py'
              - 'doc/index.md'
              - 'doc/**/*'
  update_development_version:
    needs: changes
    name: Update development version
    if: ${{ !contains(github.event.head_commit.message, '[Bot]') && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-slim
    steps:
      - name: Generate token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.TOKEN_APP_ID }}
          private-key: ${{ secrets.TOKEN_APP_SECRET }}
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          sparse-checkout: |
            build_system
      - name: Setup git
        uses: fregante/setup-git-user@v2
      - name: Update development version
        run: |
          ./build increment_development_version
          git add build_system/res/versioning/version-dev
          git commit -m "[Bot] Update development version to $(cat build_system/res/versioning/version-dev)."
          git push
  publish_doc:
    needs: update_development_version
    name: Publish documentation
    if: ${{ always() && !contains(github.event.head_commit.message, '[Bot]') && needs.changes.outputs.doc == 'true' }}
    uses: ./.github/workflows/template_publish_doc.yml
    secrets: inherit
  readthedocs_build:
    needs: publish_doc
    name: Trigger readthedocs build
    if: ${{ always() && !contains(github.event.head_commit.message, '[Bot]') && needs.changes.outputs.doc == 'true' }}
    uses: ./.github/workflows/template_publish_doc_rdt.yml
    secrets: inherit
  workflow_python_version:
    needs:
      - update_development_version
    name: Determine Python version for workflow
    if: ${{ needs.changes.outputs.any == 'true' }}
    runs-on: ubuntu-slim
    outputs:
      workflow_python_version: ${{ steps.workflow_python_version.outputs.workflow_python_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: build_system/res/versioning/version-python
          sparse-checkout-cone-mode: false
      - name: Determine Python version for workflow
        id: workflow_python_version
        run: echo "workflow_python_version=$(sed s/,//g build_system/res/versioning/version-python)" >> $GITHUB_OUTPUT
  publish_packages:
    needs:
      - update_development_version
      - workflow_python_version
    name: Publish wheel packages
    uses: ./.github/workflows/template_publish.yml
    with:
      workflow_python_version: ${{ needs.workflow_python_version.outputs.workflow_python_version }}
      linux: true
      macos: true
      windows: true
    secrets: inherit
  upload_to_pypi:
    needs: publish_packages
    name: Upload wheels to Test-PyPI
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
    steps:
      - name: Download wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          path: wheelhouse
          merge-multiple: true
      - name: Upload wheels to Test-PyPI
        uses: pypa/gh-action-pypi-publish@v1.14.0
        with:
          packages-dir: wheelhouse
          skip-existing: true
          repository-url: https://test.pypi.org/legacy/
