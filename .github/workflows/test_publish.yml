---
name: Test publishing packages
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-slim
    outputs:
      linux: ${{ steps.filter.outputs.linux }}
      macos: ${{ steps.filter.outputs.macos }}
      windows: ${{ steps.filter.outputs.windows }}
      any: ${{ steps.filter.outputs.any }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            build_system
            python
      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            build_files: &build_files
              - '.github/workflows/test_publish.yml'
              - '.github/workflows/template_publish.yml'
              - '.github/workflows/template_publish_platform.yml'
              - '.github/workflows/template_publish_pure.yml'
              - 'build'
              - 'build.bat'
              - 'build_system/main.py'
              - 'build_system/requirements.txt'
              - 'build_system/core/**'
              - 'build_system/util/**'
              - 'build_system/targets/*.py'
              - 'build_system/targets/packaging/*'
              - 'build_system/targets/publishing/*'
              - 'build_system/res/versioning/version-python'
              - 'python/subprojects/**/requirements.txt'
            linux: &linux
              - *build_files
              - '.github/workflows/template_publish_platform_linux.yml'
            macos: &macos
              - *build_files
              - '.github/workflows/template_publish_platform_macos.yml'
              - 'build_system/targets/dependencies/*'
              - 'build_system/targets/dependencies/macos/*'
            windows: &windows
              - *build_files
              - '.github/workflows/template_publish_platform_windows.yml'
            any: &any
              - *linux
              - *macos
              - *windows
  test_release:
    needs: changes
    if: ${{ needs.changes.outputs.any == 'true' }}
    name: Test publishing wheel packages
    uses: ./.github/workflows/template_publish.yml
    with:
      linux: ${{ needs.changes.outputs.linux == 'true' }}
      macos: ${{ needs.changes.outputs.macos == 'true' }}
      windows: ${{ needs.changes.outputs.windows == 'true' }}
  run_wheels:
    needs: test_release
    name: Run wheels
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-26
          - macos-26-intel
          - windows-2025
          - windows-11-arm
        subproject:
          - boosting
          - seco
    uses: ./.github/workflows/template_run_wheel.yml
    with:
      os: ${{ matrix.os }}
      subproject: ${{ matrix.subproject }}
  check_success:
    needs: run_wheels
    if: ${{ always() && !cancelled() && needs.changes.outputs.any == 'true' }}
    name: Test publishing packages succeeded
    runs-on: ubuntu-slim
    steps:
      - name: Check for success
        run: |-
          if [[ "${{ needs.run_wheels.result }}" == "failure" ]]; then
            exit 1
          fi
