---
name: Publish platform wheels
on:
  workflow_call:
    inputs:
      subproject:
        required: true
        type: string
      workflow_python_version:
        required: true
        type: string
      release:
        required: false
        type: boolean
      linux:
        required: false
        type: boolean
      macos:
        required: false
        type: boolean
      windows:
        required: false
        type: boolean
jobs:
  publish_linux_wheels:
    if: ${{ inputs.linux == true }}
    name: Publish ${{ inputs.subproject }} (Linux)
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
    uses: ./.github/workflows/template_publish_platform_linux.yml
    with:
      workflow_python_version: ${{ inputs.workflow_python_version }}
      subproject: ${{ inputs.subproject }}
      os: ${{ matrix.os }}
      release: ${{ inputs.release }}
  publish_macos_wheels:
    if: ${{ inputs.macos == true }}
    name: Publish ${{ inputs.subproject }} (macOS)
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-26
          - macos-26-intel
    uses: ./.github/workflows/template_publish_platform_macos.yml
    with:
      workflow_python_version: ${{ inputs.workflow_python_version }}
      subproject: ${{ inputs.subproject }}
      os: ${{ matrix.os }}
      release: ${{ inputs.release }}
    secrets: inherit
  publish_windows_wheels:
    if: ${{ inputs.windows == true }}
    name: Publish ${{ inputs.subproject }} (Windows)
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-2025
          - windows-11-arm
    uses: ./.github/workflows/template_publish_platform_windows.yml
    with:
      workflow_python_version: ${{ inputs.workflow_python_version }}
      subproject: ${{ inputs.subproject }}
      os: ${{ matrix.os }}
      release: ${{ inputs.release }}
