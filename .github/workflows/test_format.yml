---
name: Check code style
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-slim
    outputs:
      cpp: ${{ steps.filter.outputs.cpp }}
      python: ${{ steps.filter.outputs.python }}
      cfg: ${{ steps.filter.outputs.cfg }}
      md: ${{ steps.filter.outputs.md }}
      yaml: ${{ steps.filter.outputs.yaml }}
      toml: ${{ steps.filter.outputs.toml }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Determine supported Python versions
        id: python_version
        run: echo "python_version=$(sed s/,//g build_system/res/versioning/version-python)" >> $GITHUB_OUTPUT
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.python_version.outputs.python_version }}
          check-latest: true
          cache: pip
          cache-dependency-path: '**/requirements.txt'
      - name: Detect changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            build_files: &build_files
              - '.github/workflows/test_format.yml'
              - 'build'
              - 'build_system/main.py'
              - 'build_system/requirements.txt'
              - 'build_system/core/**'
              - 'build_system/util/**'
              - 'build_system/targets/*.py'
              - 'build_system/targets/code_style/*'
            cpp:
              - *build_files
              - 'build_system/targets/code_style/cpp/*'
              - '.cpplint.cfg'
              - '**/*.hpp'
              - '**/*.cpp'
            python:
              - *build_files
              - 'build_system/targets/code_style/python/*'
              - '.cython-lint.toml'
              - '**/*.py'
            cfg:
              - *build_files
              - 'build_system/targets/code_style/cfg/*'
              - '**/*.cfg'
            md:
              - *build_files
              - 'build_system/targets/code_style/markdown/*'
              - '**/*.md'
            yaml:
              - *build_files
              - 'build_system/targets/code_style/yaml/*'
              - '**/*.y*ml'
            toml:
              - *build_files
              - 'build_system/targets/code_style/toml/*'
              - '**/*.toml'
  test_format_cpp:
    needs: changes
    if: ${{ needs.changes.outputs.cpp == 'true' }}
    name: Check C++ source files
    uses: ./.github/workflows/template_format.yml
    with:
      language: cpp
  test_format_python:
    needs: changes
    if: ${{ needs.changes.outputs.python == 'true' }}
    name: Check Python source files
    uses: ./.github/workflows/template_format.yml
    with:
      language: python
  test_format_cfg:
    needs: changes
    if: ${{ needs.changes.outputs.cfg == 'true' }}
    name: Check .cfg files
    uses: ./.github/workflows/template_format.yml
    with:
      language: cfg
  test_format_md:
    needs: changes
    if: ${{ needs.changes.outputs.md == 'true' }}
    name: Check Markdown files
    uses: ./.github/workflows/template_format.yml
    with:
      language: md
  test_format_yaml:
    needs: changes
    if: ${{ needs.changes.outputs.yaml == 'true' }}
    name: Check YAML files
    uses: ./.github/workflows/template_format.yml
    with:
      language: yaml
  test_format_toml:
    needs: changes
    if: ${{ needs.changes.outputs.toml == 'true' }}
    name: Check TOML files
    uses: ./.github/workflows/template_format.yml
    with:
      language: toml
  check_success:
    needs:
      - test_format_cpp
      - test_format_python
      - test_format_cfg
      - test_format_md
      - test_format_yaml
      - test_format_toml
    if: ${{ always() && !cancelled() }}
    name: Test check code style succeeded
    runs-on: ubuntu-slim
    steps:
      - name: Check for success
        run: |-
          if [[ "${{ needs.test_format_cpp.result }}" == "failure" ]]; then
            exit 1
          fi
          if [[ "${{ needs.test_format_python.result }}" == "failure" ]]; then
            exit 1
          fi
          if [[ "${{ needs.test_format_cfg.result }}" == "failure" ]]; then
            exit 1
          fi
          if [[ "${{ needs.test_format_md.result }}" == "failure" ]]; then
            exit 1
          fi
          if [[ "${{ needs.test_format_yaml.result }}" == "failure" ]]; then
            exit 1
          fi
          if [[ "${{ needs.test_format_toml.result }}" == "failure" ]]; then
            exit 1
          fi
